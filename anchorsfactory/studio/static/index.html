<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>anchorsfactory · studio</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='3' fill='%2312161C'/%3E%3Ccircle cx='8' cy='8' r='3.4' fill='none' stroke='%23FF5C39' stroke-width='1.4'/%3E%3Ccircle cx='8' cy='8' r='1.3' fill='%23FF5C39'/%3E%3C/svg%3E">
<link rel="stylesheet" href="/static/app.css">
</head>
<body>
<header>
  <div class="brand"><b>anchorsfactory</b><span class="dot">·</span>studio</div>
  <div class="meta" id="fontmeta">—</div>
  <div class="spacer"></div>
  <button id="theme" class="ghost icon" title="toggle light / dark theme" aria-label="toggle theme">◐</button>
  <button id="loadfont" class="ghost" title="drop a .ufoz/.zip (or a .ufo folder) anywhere, or click to pick a file">load .ufoz ▾</button>
  <input id="fontfile" type="file" accept=".ufoz,.zip" hidden>
  <div class="pill" id="status">idle</div>
</header>
<div id="drop"><div class="box">
  <div class="big">drop a font or a .anchors</div>
  <div class="small">a zipped UFO (.ufoz / .zip) or .ufo folder to debug — or a .anchors rules file to edit</div>
</div></div>
<main>
  <section class="editor">
    <div class="find" id="find" hidden>
      <input id="findq" placeholder="find in rules…" spellcheck="false" autocomplete="off">
      <span class="find-count" id="findcount"></span>
      <button id="findprev" class="ghost icon" title="previous (Shift+Enter)">↑</button>
      <button id="findnext" class="ghost icon" title="next (Enter)">↓</button>
      <button id="findclose" class="ghost icon" title="close (Esc)">✕</button>
    </div>
    <div class="pane" id="paneAnchors">
      <div class="pane-head">
        <span class="ln-name">anchors</span>
        <select id="preset" class="mini" title="base preset (seeds the default layer)"></select>
        <div class="spacer" style="flex:1"></div>
        <button data-a="find" class="ghost mini-btn" title="find in rules (Ctrl+F)">find</button>
        <button data-a="dl-anchor" class="ghost mini-btn" title="download the active layer">⤓ .anchors</button>
      </div>
      <div class="tabstrip" id="anchorTabs"></div>
      <div class="pane-body" id="anchorEditors"></div>
    </div>
    <div class="split row" data-t="consh" title="drag to resize · double-click to reset"></div>
    <div class="pane" id="paneConstruction">
      <div class="pane-head">
        <span class="ln-name gc">construction</span><span class="ln-badge">glyphConstruction</span>
        <div class="spacer" style="flex:1"></div>
        <button data-a="find-gc" class="ghost mini-btn" title="find (Ctrl+F)">find</button>
        <button data-a="dl-gc" class="ghost mini-btn" title="download constructions">⤓ .glyphConstruction</button>
      </div>
      <div class="layer-ed" id="edGC"></div>
    </div>
    <div class="split row" data-t="outh" title="drag to resize · double-click to reset"></div>
    <section class="output" id="output">
      <div class="output-bar" id="outbar" title="problems &amp; diagnostics — click to toggle">
        <span class="out-dot"></span>
        <span class="ln-name">output</span>
        <span class="out-count" id="outcount"></span>
        <span class="spacer" style="flex:1"></span>
        <span class="out-chev">▾</span>
      </div>
      <div class="problems" id="problems"></div>
    </section>
    <input id="rulesfile" type="file" accept=".anchors,.af,.dsl,.txt" hidden>
  </section>
  <div class="split col" data-t="edw" title="drag to resize · double-click to reset"></div>
  <section class="stage">
    <div class="gridwrap">
      <div class="gridhead">
        <div class="tabs" id="gridtabs">
          <button class="tab" data-tab="all" title="every glyph in the font">all glyphs</button>
          <button class="tab sel" data-tab="anchored" title="glyphs at least one anchor rule placed">anchored</button>
          <button class="tab" data-tab="composites" title="composites GlyphConstruction assembled from the placed anchors">composites</button>
        </div>
        <label class="hideaff" id="unusedwrap" hidden><input type="checkbox" id="unusedcb"> show unused</label>
        <span class="gridcount" id="count">0</span>
        <div class="gh-spacer"></div>
        <input id="glyphq" class="mini" placeholder="filter glyphs…" spellcheck="false" autocomplete="off">
      </div>
      <div class="glyphgrid" id="grid"></div>
    </div>
    <div class="split row" data-t="gridh" title="drag to resize · double-click to reset"></div>
    <div class="inspector">
      <div class="canvas" id="canvas">
        <div class="ctools" id="ctools">
          <button data-v="mode" class="ghost" title="fill / outline">fill</button>
          <span class="sep"></span>
          <button data-v="zoom-out" class="ghost icon" title="zoom out (scroll)">−</button>
          <span id="zoomlbl" title="zoom (scroll to change)">100%</span>
          <button data-v="zoom-in" class="ghost icon" title="zoom in (scroll)">+</button>
          <button data-v="zoom-reset" class="ghost icon" title="reset zoom">⟲</button>
        </div>
        <div class="empty">select a glyph</div>
      </div>
      <div class="split col" data-t="row" title="drag to resize · double-click to reset"></div>
      <aside class="readout" id="readout"></aside>
    </div>
    <div class="legend">
      <span><i class="swatch" style="background:var(--anchor)"></i>anchor</span>
      <span><i class="swatch" style="background:var(--scan)"></i>sample scanline</span>
      <span><i class="swatch" style="background:var(--stem)"></i>ink stem</span>
      <span><i class="swatch" style="background:var(--metric)"></i>metric / bbox</span>
    </div>
  </section>
</main>
<script src="/static/app.js"></script>
</body>
</html>
